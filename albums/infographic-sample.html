<script>
    // --- SHARED INFINITE SCROLL LOGIC ---
    let masonryInstance = null;
    let renderedCount = 0;
    const CHUNK_SIZE = 48;

    function initInfiniteScroll(photos) {
        window.currentPhotos = photos;
        renderedCount = 0;

        const grid = document.querySelector('#masonry-grid');
        const sentinel = document.getElementById('sentinel');

        if (!grid || !sentinel) return;

        // Show sentinel
        sentinel.style.display = 'block';

        // Init Masonry
        masonryInstance = new Masonry(grid, {
            itemSelector: '.gallery-item',
            percentPosition: true
        });

        // Render Function
        window.renderNextChunk = function () {
            if (renderedCount >= photos.length) {
                sentinel.style.display = 'none'; // distinct from "End of text"
                return;
            }

            const nextBatch = photos.slice(renderedCount, renderedCount + CHUNK_SIZE);
            const html = nextBatch.map((photo, i) => {
                const index = renderedCount + i;
                const safeName = photo.filename.replace(/\./g, '_');
                const viewId = photo.id || `${photo.albumSlug}__${safeName}`;

                return `
                    <div class="col-sm-6 col-md-4 col-lg-3 mb-4 gallery-item">
                        <div class="photo-card" onclick="openLightbox(${index})" style="cursor: pointer; position: relative;" data-view-id="${viewId}">
                            <img src="${photo.src}" alt="${photo.name}" loading="lazy">
                            <div class="view-overlay" style="position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; color: white; font-size: 0.75rem; display: flex; align-items: center; gap: 4px; pointer-events: none;">
                                <ion-icon name="eye-outline"></ion-icon>
                                <span class="view-count-text">...</span>
                            </div>
                        </div>
                    </div>
                 `;
            }).join('');

            // Append
            grid.insertAdjacentHTML('beforeend', html);

            imagesLoaded(grid, function () {
                masonryInstance.reloadItems();
                masonryInstance.layout();
                if (window.refreshViewCounts) window.refreshViewCounts();
            });

            renderedCount += nextBatch.length;
        };

        // Observer
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                window.renderNextChunk();
            }
        }, { rootMargin: '400px' });
        observer.observe(sentinel);

        // First Load
        window.renderNextChunk();
    }
</script>

        [{"type":"single","src":"../split/infographic-sample/infographic-001.webp","src_a":null,"src_b":null,"name":"infographic-001","metadata":{"title":"Dải non sông Việt Nam","description":null,"variant":"ai_technology","attributes":{"category":"AI training","application":"Infographic","models":["Gemini"]},"tags":["gemini"]},"content":"\r\n**PROMPT – DẢI NON SÔNG VIỆT NAM\r\n(NHIỀU HÌNH • LIÊN KẾT • BỐ CỤC RÕ • CAO CẤP)**\r\nThiết kế một infographic cao cấp mang tên “DẢI NON SÔNG VIỆT NAM”, thể hiện vẻ đẹp đất nước Việt Nam bằng nhiều hình ảnh thật, bố cục rõ ràng, liên kết chặt chẽ trong một dải hình ảnh liền mạch duy nhất. Phong cách ảnh phóng sự hiện đại – truyền thông quốc gia, đẹp, sang, dễ xem, không minh hoạ, không đồ họa vẽ.\r\nKhung hình 16:9 ngang. Toàn bộ bố cục là một dải thị giác chạy liên tục từ trái sang phải, tượng trưng cho chiều dài đất nước. Các hình ảnh không tách khung cứng, mà được gối nhẹ, chồng lớp tinh tế, kết nối bằng không gian, màu sắc và hướng chuyển động.\r\n⸻\r\n🟦 PHẦN 1 – MIỀN BẮC (MỞ ĐẦU)\r\nHình ảnh thật:\r\n• Núi rừng Tây Bắc / ruộng bậc thang\r\n• Sông núi hùng vĩ, mây trời\r\nGóc rộng, ánh sáng trong.\r\nMàu chủ đạo: xanh núi – vàng ruộng – xám mây.\r\nHình ảnh lan màu và địa hình sang phần tiếp theo.\r\nChữ nhỏ:\r\nMIỀN BẮC – NÚI & SÔNG\r\n⸻\r\n🟨 PHẦN 2 – MIỀN TRUNG (TRỤC GIỮA)\r\nHình ảnh thật:\r\n• Dải biển miền Trung\r\n• Núi – biển – làng chài / di sản\r\nHình ảnh gối lên phần miền Bắc, dùng đường bờ biển làm đường dẫn thị giác mạnh.\r\nMàu chuyển: xanh núi → xanh biển → vàng nắng.\r\nChữ:\r\nMIỀN TRUNG – BIỂN & GIÓ\r\n⸻\r\n🟩 PHẦN 3 – TÂY NGUYÊN (CHIỀU SÂU)\r\nHình ảnh thật:\r\n• Cao nguyên, đất đỏ bazan\r\n• Nhà rông / con người\r\nHình ảnh đặt hơi lùi vào trung cảnh, tạo chiều sâu cho dải hình.\r\nMàu nâu đỏ – xanh rừng hòa với miền Trung.\r\nChữ:\r\nTÂY NGUYÊN – ĐẤT & NGƯỜI\r\n⸻\r\n🟦 PHẦN 4 – NAM BỘ (KẾT DẢI)\r\nHình ảnh thật:\r\n• Sông nước miền Tây\r\n• Đồng bằng – chợ nổi – cuộc sống\r\nĐường sông uốn cong tạo kết thúc mềm cho dải hình.\r\nMàu xanh nước – xanh cây – ánh nắng ấm.\r\nChữ:\r\nNAM BỘ – SÔNG & SỰ SỐNG\r\n⸻\r\n🎨 MÀU SẮC & LIÊN KẾT\r\n• Một bảng màu thống nhất cho toàn dải\r\n• Màu chuyển tự nhiên theo địa lý:\r\nnúi → biển → cao nguyên → sông nước\r\n• Không ảnh nào bị “lạc tông”\r\n• Chỉnh màu vừa phải, bắt mắt nhưng thật\r\n🧱 BỐ CỤC\r\n• Dải hình liên tục\r\n• Gối – chồng lớp nhẹ\r\n• Không viền cứng\r\n• Không icon\r\n• Không logo, không watermark\r\n⸻\r\n🖋 DÒNG CHỐT (CUỐI DẢI)\r\nĐặt ở góc phải, chữ sang, rõ:\r\nDẢI NON SÔNG VIỆT NAM","id":"b1551a855d719e7b","filename":"infographic-001.jpg","albumSlug":"infographic-sample"},{"type":"single","src":"../split/infographic-sample/infographic-002.webp","src_a":null,"src_b":null,"name":"infographic-002","metadata":{"title":"Quy trình sản xuất gốm thủ công","description":null,"variant":"ai_technology","attributes":{"category":"AI training","application":"Infographic","models":["Gemini"]},"tags":["gemini"]},"content":"\r\nThiết kế một tác phẩm infographic nghệ thuật cao cấp mô tả quy trình sản xuất gốm thủ công, phong cách cinematic fine-art hiện đại. Khung hình 16:9 ngang, bố cục tổng thể uốn cong mềm mại theo dạng đường cong chữ S hoặc vòng cung nhẹ, dẫn ánh nhìn từ trái sang phải. Chỉ bố cục và khung dẫn hướng là cong, còn hình ảnh từng giai đoạn phải rõ ràng, sắc nét, tách bạch, không hòa tan, không mờ, không trừu tượng quá mức.\r\nToàn bộ infographic được chia thành các khung hình riêng biệt (frame) nhưng các frame được bo cong mềm, liên kết với nhau bằng đường dẫn cong mảnh, tạo cảm giác liền mạch và nghệ thuật. Mỗi frame là một cảnh hoàn chỉnh, rõ nội dung, dễ nhận biết ngay lập tức.\r\nFrame đầu tiên là đất sét nguyên liệu, khối đất sét thật, kết cấu rõ từng vân đất ẩm, đặt trên bề mặt gỗ hoặc đá. Ánh sáng studio mềm, làm nổi texture, hình ảnh sắc nét, không hiệu ứng tan chảy.\r\nFrame tiếp theo là tạo hình trên bàn xoay, bàn tay nghệ nhân đang tạo dáng gốm, chuyển động được “đóng băng” ở khoảnh khắc đẹp nhất. Khối gốm tròn trịa, đường cong rõ ràng, nền mờ nhẹ để tập trung vào chủ thể.\r\nFrame thứ ba là sản phẩm gốm thô sau tạo hình, đặt độc lập, hình dáng cân đối, bề mặt mịn, ánh sáng đều, nhìn rõ hình khối và tỷ lệ.\r\nFrame tiếp theo là nung gốm trong lò, lửa và nhiệt xuất hiện rõ ràng nhưng được kiểm soát, ánh lửa cam bao quanh sản phẩm, không quá dữ, không che khuất hình dáng gốm. Sản phẩm vẫn nhìn rõ cấu trúc.\r\nFrame kế tiếp là phủ men, lớp men gốm chảy mịn trên bề mặt, hiệu ứng phản chiếu rõ ràng, bề mặt gốm sắc nét, không mờ, không hòa lẫn background.\r\nFrame cuối cùng là tác phẩm gốm hoàn chỉnh, đặt trong không gian gallery tối giản, ánh sáng chiếu trực tiếp từ trên xuống, làm nổi hình khối, chất liệu và màu men. Sản phẩm là điểm kết thúc thị giác rõ ràng.\r\nBảng màu tổng thể tinh tế và cao cấp gồm nâu đất, trắng ngà, xanh ngọc, xám tro và ánh cam lửa. Ánh sáng đồng nhất giữa các frame để giữ sự liền mạch, nhưng mỗi frame vẫn có điểm nhấn riêng. Typography nếu xuất hiện chỉ là text nhỏ, gọn, đặt ngoài frame hoặc sát đường cong dẫn hướng, font serif hoặc sans-serif cao cấp, dễ đọc.\r\nKhông logo, không watermark, không icon dư thừa. Tổng thể giống infographic nghệ thuật cao cấp, nơi bố cục cong tạo cảm xúc, còn hình ảnh rõ ràng tạo giá trị thông tin và thẩm mỹ.","id":"b4d7107436d72e8a","filename":"infographic-002.jpg","albumSlug":"infographic-sample"},{"type":"single","src":"../split/infographic-sample/infographic-003.webp","src_a":null,"src_b":null,"name":"infographic-003","metadata":{"title":"Sầu riêng Việt Nam","description":null,"variant":"ai_technology","attributes":{"category":"AI training","application":"Infographic","models":["Gemini"]},"tags":["gemini"]},"content":"\r\nThiết kế một key visual nghệ thuật siêu thực (hyper-realistic art) mang đẳng cấp thượng hạng, tái hiện hành trình phát triển của cây sầu riêng Việt Nam như một biểu tượng giá trị nông nghiệp cao cấp. Khung hình 16:9 ngang, phong cách luxury cinematic fine-art, độ chi tiết cực cao, ánh sáng điện ảnh tinh tế, cảm giác sang trọng, trầm tĩnh và quyền uy, giống một tác phẩm trưng bày gallery hơn là infographic thông thường.\r\nToàn bộ bố cục được dẫn dắt theo một đường chuyển động nghệ thuật mềm mại, ánh nhìn trôi từ trái sang phải như một vòng đời liền mạch, không chia khung, không mốc cứng, mọi giai đoạn hòa quyện trong cùng một không gian thị giác thống nhất.\r\nMở đầu là hình ảnh đất đỏ bazan Việt Nam siêu chân thực, kết cấu đất rõ từng hạt, ánh sáng sớm chiếu xiên làm nổi độ ẩm và sức sống. Từ lớp đất, rễ cây sầu riêng hiện lên mạnh mẽ, lan sâu và chắc, biểu tượng cho nền tảng và sự bền vững.\r\nTừ lớp đất đó vươn lên thân cây sầu riêng trưởng thành, tán lá xanh đậm, từng chiếc lá hiện rõ gân lá, ánh sáng xuyên qua tạo hiệu ứng volumetric light tinh tế. Trên thân cây xuất hiện hoa sầu riêng nở, màu trắng ngà, mềm mại nhưng đầy sức sống, được xử lý siêu thật như nhiếp ảnh macro cao cấp.\r\nPhần trung tâm tác phẩm là trái sầu riêng phát triển hoàn chỉnh, kích thước lớn, gai sắc nét, bề mặt vỏ thể hiện rõ từng chi tiết ánh sáng và bóng đổ. Trái sầu riêng treo trên thân cây như một báu vật tự nhiên, ánh sáng tập trung nhẹ để tạo cảm giác tôn vinh.\r\nCảnh chuyển mượt sang khoảnh khắc trái sầu riêng chín, một phần vỏ hé mở để lộ múi sầu riêng vàng óng bên trong, kết cấu mịn, ánh sáng phản chiếu mềm, gợi cảm giác cao cấp, giàu dinh dưỡng và giá trị. Không tạo cảm giác “ẩm thực đại trà”, mà giống hình ảnh quảng bá sản phẩm xa xỉ.\r\nBackground được xử lý tối giản và sâu, có thể là không gian vườn sầu riêng Việt Nam mờ ảo trong sương sớm hoặc nền tối chuyển sắc xanh – nâu – vàng, tạo chiều sâu thị giác và làm nổi toàn bộ chủ thể. Không chi tiết thừa, không con người, không vật thể gây nhiễu.\r\nBảng màu tổng thể mang tinh thần thượng hạng: xanh lá đậm, xanh ngọc trầm, nâu đất bazan, vàng sầu riêng ánh kim, kết hợp ánh sáng mềm, tương phản vừa phải. Texture cực kỳ mịn, độ nét cao nhưng không sharpen gắt, cảm giác “đắt tiền” ngay từ cái nhìn đầu tiên.\r\nTypography xuất hiện cực kỳ tiết chế, nếu có chỉ là một dòng chữ mảnh, đặt xa chủ thể, font serif cao cấp hoặc modern serif sang trọng, màu vàng nhạt hoặc trắng ngà:\r\n“SẦU RIÊNG VIỆT NAM”.\r\nKhông logo, không watermark, không icon, không yếu tố infographic. Tổng thể giống một tác phẩm nghệ thuật siêu thực hoặc key visual luxury nông sản cao cấp dành cho thị trường xuất khẩu và thương hiệu lớn.\r\n\r\n","id":"19e2e7d4a604b15c","filename":"infographic-003.jpg","albumSlug":"infographic-sample"},{"type":"single","src":"../split/infographic-sample/infographic-004.webp","src_a":null,"src_b":null,"name":"infographic-004","metadata":{"title":"Quy trình sản xuất kẹo dừa Bến Tre","description":null,"variant":"ai_technology","attributes":{"category":"AI training","application":"Infographic","models":["Gemini"]},"tags":["gemini"]},"content":"\r\nThiết kế một infographic phong cách miniature (thế giới thu nhỏ) giới thiệu đặc sản Việt Nam kẹo dừa Bến Tre, mang cảm giác dễ thương, tinh tế nhưng vẫn cao cấp và sạch sẽ. Khung hình 16:9 ngang, bố cục rõ ràng, gọn gàng, mọi chi tiết được thu nhỏ như một mô hình tí hon, tạo cảm giác vừa đáng yêu vừa chuyên nghiệp, không hoạt hình rẻ tiền.\r\nToàn bộ infographic được xây dựng như một mini world trên một mặt phẳng sáng. Trung tâm là viên kẹo dừa Bến Tre khổng lồ (so với nhân vật), màu trắng ngà hoặc vàng sữa, bề mặt mịn, hơi bóng nhẹ. Xung quanh viên kẹo là các nhân vật tí hon đang làm việc, tạo cảm giác sinh động và dễ hiểu.\r\nPhần đầu mini world là vườn dừa Bến Tre thu nhỏ, những cây dừa tí hon xanh mướt, thân cong nhẹ, soi bóng xuống dòng sông nhỏ uốn lượn. Nhân vật tí hon đang hái dừa bằng thang nhỏ. Text nhỏ, rõ ràng đặt phía trên:\r\n“DỪA BẾN TRE”.\r\nTiếp theo là khu tách dừa – nạo cơm dừa dạng mô hình tí hon, trái dừa bổ đôi, cơm dừa trắng mịn, nước cốt dừa chảy nhẹ như dòng suối nhỏ. Nhân vật tí hon đang khuấy, múc nước cốt. Text đặt gọn:\r\n“LẤY CỐT DỪA”.\r\nCảnh tiếp theo là khu nấu kẹo thu nhỏ, chảo lớn nhưng đặt trong thế giới tí hon, nước cốt dừa đang sên sánh mịn, nhân vật nhỏ khuấy đều, hơi nước bay nhẹ. Text nhỏ:\r\n“NẤU & SÊN KẸO”.\r\nSau đó là khu cắt kẹo mini, những thanh kẹo vuông vắn, nhân vật tí hon đang cắt và xếp kẹo rất ngăn nắp. Text ngắn:\r\n“TẠO HÌNH”.\r\nTiếp theo là khu đóng gói tí hon, hộp kẹo nhỏ xinh, nhân vật mini đang gói kẹo, xếp hộp ngay ngắn. Text đặt tinh tế:\r\n“ĐÓNG GÓI”.\r\nKết thúc mini world là hình ảnh kẹo dừa Bến Tre hoàn chỉnh, đặt nổi bật, xung quanh là các nhân vật tí hon vẫy tay, tạo cảm giác thân thiện và vui vẻ. Text cuối đặt rõ ràng nhưng dễ thương:\r\n“KẸO DỪA BẾN TRE”.\r\nBảng màu tổng thể trong trẻo, dịu mắt và cao cấp: trắng kem, vàng sữa, xanh lá dừa, xanh nước nhạt, nâu gỗ nhẹ. Ánh sáng mềm, đều, shadow sạch, cảm giác như mô hình trưng bày cao cấp. Phong cách 3D miniature chi tiết cao, bề mặt mịn, không noise, không rối, phù hợp làm infographic giáo dục, du lịch, đặc sản Việt. Không logo, không watermark.","id":"bef77d8c721b4478","filename":"infographic-004.jpg","albumSlug":"infographic-sample"},{"type":"single","src":"../split/infographic-sample/infographic-005.webp","src_a":null,"src_b":null,"name":"infographic-005","metadata":{"title":"584 Nha Trang – tinh túy bữa cơm Việt","description":null,"variant":"ai_technology","attributes":{"category":"AI training","application":"Infographic","models":["Gemini"]},"tags":["gemini"]},"content":"\r\nThiết kế một infographic cao cấp, thiên hoàn toàn về thị giác, mô tả hành trình tạo ra chai nước mắm 584 Nha Trang từ biển cả đến bữa cơm gia đình Việt. Khung hình 16:9 ngang, phong cách cinematic editorial, màu sắc sâu và nổi bật, cảm giác hiện đại nhưng gần gũi. Toàn bộ bố cục đi theo một đường cong nghệ thuật mềm mại như con sóng biển, dẫn ánh nhìn từ trái sang phải, không chia ô cứng, không bố cục thẳng hàng.\r\nMở đầu là hình ảnh cận cảnh mặt biển Nha Trang lúc bình minh, nước biển xanh trong phản chiếu bầu trời, ánh nắng sớm long lanh, đàn cá cơm tươi bơi gần mặt nước, cảm giác tinh khiết và dồi dào. Trên hình chỉ đặt dòng chữ nhỏ, tinh tế: “Cá cơm Nha Trang – nguồn gốc tự nhiên”.\r\nTiếp theo, cảnh chuyển mượt sang hình ảnh ngư dân Việt kéo lưới cá cơm trên thuyền gỗ truyền thống, nước biển văng nhẹ trong không khí, chuyển động có nhịp, ánh sáng sớm tạo cảm giác chân thật và giàu năng lượng. Dòng chữ nổi nhẹ ở góc hình: “Đánh bắt – chọn lọc”.\r\nCảnh tiếp theo là hình ảnh cá cơm tươi trộn cùng muối biển và xếp lớp trong thùng gỗ ủ chượp, góc quay nghiêng đẹp, màu gỗ nâu trầm kết hợp ánh sáng dịu, không khí tĩnh lặng và sâu, thể hiện vai trò của thời gian. Text đặt rất gọn: “Ủ chượp – theo thời gian”.\r\nSau đó là cảnh cận khoảnh khắc nước mắm nhĩ nguyên chất chảy ra từng giọt, màu hổ phách óng ánh, chuyển động chậm và mượt, background tối giản để làm nổi chất lỏng, cảm giác tinh túy và cao cấp. Dòng chữ ngắn đặt gần dòng chảy: “Tinh chất nhĩ”.\r\nCảnh chuyển tiếp mượt sang hình ảnh chai nước mắm 584 thủy tinh được chiết rót trong không gian sạch sẽ, ánh sáng studio mềm, thân chai trong suốt làm nổi màu nước mắm bên trong, cảm giác chuẩn mực và an tâm. Text nhỏ đặt giữa khung hình: “Chiết rót – đóng chai”.\r\nKết thúc hành trình là hình ảnh chai nước mắm 584 Nha Trang đặt trên mâm cơm gia đình Việt, xung quanh là các món ăn quen thuộc được sắp xếp tiết chế, ánh sáng vàng ấm, hơi nước nhẹ, không khí sum vầy và thân thuộc. Dòng chữ cuối đặt nổi bật nhưng vẫn tinh tế: “584 Nha Trang – tinh túy bữa cơm Việt”.\r\nỞ góc phải khung hình, đặt dòng chữ chốt mang tính cảm xúc: “Thời gian và biển cả tạo nên từng giọt mắm”. Tổng thể hình ảnh sắc nét, ánh sáng đẹp, màu xanh biển – nâu gỗ – hổ phách – vàng ấm hài hòa, cảm giác xem như một poster nghệ thuật cao cấp hơn là infographic giáo khoa, không logo phụ, không watermark.","id":"10723ad866644218","filename":"infographic-005.jpg","albumSlug":"infographic-sample"},{"type":"single","src":"../split/infographic-sample/infographic-006.webp","src_a":null,"src_b":null,"name":"infographic-006","metadata":{"title":"Hành trình hạt gạo Việt Nam","description":null,"variant":"ai_technology","attributes":{"category":"AI training","application":"Infographic","models":["Gemini"]},"tags":["gemini"]},"content":"\r\nThiết kế một infographic cao cấp, thiên hoàn toàn về thị giác, mô tả hành trình hạt gạo Việt Nam từ ruộng lúa đến bát cơm gia đình. Khung hình 16:9 ngang, phong cách cinematic editorial, màu sắc tươi sáng và nổi bật, cảm giác hiện đại nhưng gần gũi. Toàn bộ bố cục đi theo một đường cong nghệ thuật mềm mại như dòng sông, dẫn ánh nhìn từ trái sang phải, không chia ô cứng, không bố cục thẳng hàng.\r\nMở đầu là hình ảnh cận cảnh bàn tay người nông dân Việt Nam đang cấy mạ non xuống ruộng nước, nước phản chiếu bầu trời xanh, ánh sáng sớm long lanh, màu xanh lúa tươi mát. Trên hình chỉ đặt dòng chữ nhỏ, tinh tế: “Gieo mạ – 7–15 ngày”.\r\nTiếp theo, cảnh chuyển mượt sang toàn cảnh cánh đồng lúa xanh mướt trải dài, gió thổi tạo sóng lúa mềm mại, ánh nắng nhẹ chiếu từ phía sau, tạo cảm giác sự sống đang lan tỏa. Dòng chữ nổi nhẹ trên nền trời: “Sinh trưởng – 3 đến 4 tháng”.\r\nCảnh tiếp theo là cận cảnh bông lúa trĩu hạt chuyển sang màu vàng óng, ánh sáng golden hour xuyên qua từng hạt lúa, cảm giác ấm áp và no đủ. Text đặt rất gọn: “Chín vàng – 20–30 ngày”.\r\nSau đó là cảnh thu hoạch mang năng lượng mạnh, nông dân gặt lúa, lúa vàng tung lên trong không khí, bụi nắng lấp lánh, chuyển động sống động và điện ảnh. Dòng chữ ngắn đặt ở góc hình: “Thu hoạch – 1–3 ngày”.\r\nCảnh chuyển tiếp mượt sang hình ảnh hạt gạo trắng sạch rơi chậm trong không gian sáng, nền tối giản, cảm giác tinh khiết và cao cấp. Text nhỏ đặt giữa khung hình: “Xử lý gạo – 3–7 ngày”.\r\nKết thúc hành trình là hình ảnh bát cơm trắng nóng hổi đặt trên mâm cơm gia đình Việt, hơi nước bốc lên mềm mại, ánh sáng vàng ấm, không khí sum vầy và thân thuộc. Dòng chữ cuối đặt nổi bật nhưng vẫn tinh tế: “Bữa cơm Việt”.\r\nỞ góc phải khung hình, đặt dòng chữ chốt mang tính cảm xúc: “4–5 tháng để có một bát cơm tròn vị”. Tổng thể hình ảnh sắc nét, ánh sáng đẹp, màu xanh – vàng – trắng hài hòa, cảm giác xem như một poster nghệ thuật hơn là infographic giáo khoa, không logo, không watermark.","id":"b3e1d840aa9d7779","filename":"infographic-006.jpg","albumSlug":"infographic-sample"},{"type":"single","src":"../split/infographic-sample/infographic-007.webp","src_a":null,"src_b":null,"name":"infographic-007","metadata":{"title":"Coca-Cola","description":null,"variant":"ai_technology","attributes":{"category":"AI training","application":"Infographic","models":["Gemini"]},"tags":["gemini"]},"content":"\r\nQuảng cáo Coca-Cola cao cấp, phong cách premium beverage advertising – studio – ultra realistic.\r\nMột chai Coca-Cola thủy tinh cổ điển, tỷ lệ 1:1 (đúng kích thước thật) đặt ở trung tâm khung hình, chai nghiêng nhẹ, nhãn đỏ trắng sắc nét, không méo form.\r\nDòng Coca-Cola nâu đỏ bắn tung mạnh mẽ (liquid splash) bao quanh chai, tạo chuyển động năng lượng cao nhưng được kiểm soát gọn gàng, đông cứng ở khoảnh khắc đẹp nhất.\r\nĐá viên trong suốt bay xung quanh, có sương lạnh và giọt nước đọng trên bề mặt chai, cảm giác mát sâu – sảng khoái.\r\nKhông dùng trái cây, chỉ tập trung vào:\r\n– Coca-Cola\r\n– Đá lạnh\r\n– Bong bóng gas\r\nPhong cách màu sắc:\r\n– Đỏ Coca làm nền chủ đạo\r\n– Nâu đỏ của nước cola\r\n– Trắng tinh khiết của đá\r\n– Tương phản cao, rất “đã mắt”\r\nÁnh sáng & chất liệu:\r\n– Ánh sáng studio cao cấp\r\n– Highlight mạnh trên thân chai và splash\r\n– Thấy rõ chất lỏng trong suốt, bọt khí sống động\r\n– Chai có hiệu ứng condensation (đọng sương lạnh)\r\nBố cục:\r\n– Chai là hero visual\r\n– Splash ôm sát chai, không rối\r\n– Tổng thể cân đối, sạch, chuẩn key visual quảng cáo\r\nTypography (nếu có):\r\n– Tối giản, chỉ 1 dòng tagline nhỏ\r\n– Font sans-serif hiện đại\r\n– Không che sản phẩm\r\nPhong cách quảng cáo Coca-Cola quốc tế, cao cấp, chỉnh chu.\r\nKhông hoạt hình.\r\nKhông màu sặc sỡ lạ.\r\nKhông méo logo.\r\nKhông watermark.\r\n⸻\r\n❌ NEGATIVE PROMPT (BẮT BUỘC)\r\nchai méo, sai tỷ lệ, cartoon, chibi, màu gắt, splash rối, logo sai, chữ nhiều, poster rẻ tiền, watermark","id":"a060b967551bf2f3","filename":"infographic-007.jpg","albumSlug":"infographic-sample"},{"type":"single","src":"../split/infographic-sample/infographic-008.webp","src_a":null,"src_b":null,"name":"infographic-008","metadata":{"title":"Bia Heineken","description":null,"variant":"ai_technology","attributes":{"category":"AI training","application":"Infographic","models":["Gemini"]},"tags":["gemini"]},"content":"\r\nQuảng cáo bia Heineken cao cấp, phong cách premium beverage advertising – studio – cinematic.\r\nMột chai / lon Heineken đặt ở trung tâm khung hình, góc nhìn 3/4, logo rõ nét, sắc xanh đặc trưng, cảm giác lạnh – sảng khoái – sang trọng.\r\nDòng bia vàng óng bắn lên mạnh mẽ (liquid splash) bao quanh chai, chuyển động đông cứng ở khoảnh khắc đẹp nhất.\r\nNguyên liệu đặc trưng bay xung quanh theo bố cục có kiểm soát:\r\n– Hoa bia (hops) xanh tươi\r\n– Lúa mạch vàng\r\n– Giọt bia trong suốt\r\n– Đá lạnh tinh thể\r\nPhong cách màu sắc:\r\n– Xanh Heineken chủ đạo\r\n– Vàng bia óng ánh\r\n– Trắng tinh khiết từ đá\r\n– Tương phản cao, nhìn rất “đã mắt”\r\nÁnh sáng & chất liệu:\r\n– Ánh sáng studio cao cấp\r\n– Highlight mạnh trên giọt bia và chai\r\n– Thấy rõ hơi lạnh, sương nước đọng trên vỏ chai\r\n– Cảm giác mát sâu, uống là “đã”\r\nBố cục:\r\n– Sạch – gọn – cân đối\r\n– Không rối nguyên liệu\r\n– Nhìn như key visual quảng cáo quốc tế\r\nTypography (nếu có chữ):\r\n– Chữ tối giản, rất ít\r\n– Font sans-serif hiện đại, cao cấp\r\n– Chỉ nên có 1 tagline ngắn (tuỳ chọn)\r\nPhong cách premium – lifestyle – quảng cáo bia châu Âu.\r\nKhông hoạt hình.\r\nKhông màu sặc sỡ.\r\nKhông phong cách rẻ tiền.\r\nKhông watermark.\r\n⸻\r\n❌ NEGATIVE PROMPT (RẤT QUAN TRỌNG)\r\nhoạt hình, chibi, màu quá gắt, bố cục rối, chai méo, logo sai, font xấu, chữ nhiều, phong cách poster tạp, watermark","id":"4f2bbe5cd6350417","filename":"infographic-008.jpg","albumSlug":"infographic-sample"},{"type":"single","src":"../split/infographic-sample/infographic-009.webp","src_a":null,"src_b":null,"name":"infographic-009","metadata":{"title":"Con tôm phần nào ngon & nên ăn","description":null,"variant":"ai_technology","attributes":{"category":"AI training","application":"Infographic","models":["Gemini"]},"tags":["gemini"]},"content":"\r\n🦐 PROMPT CAO CẤP – INFOGRAPHIC CON TÔM\r\n(CHỈ RÕ BỘ PHẬN • NGON / TỐT / KHÔNG NÊN ĂN)\r\nPrompt:\r\nThiết kế infographic hiện đại về CON TÔM, phong cách sạch – sáng – sinh động – giống infographic đồ uống cao cấp.\r\nMột con tôm tươi đặt ở trung tâm khung hình, góc nhìn 3/4, thân cong tự nhiên, vỏ trong mờ óng ánh, cảm giác fresh – ngon – cao cấp.\r\nCấu trúc bên trong được thể hiện bán trong suốt, rõ ràng nhưng thân thiện, không ghê.\r\nTừng bộ phận được chỉ ra bằng mũi tên + card bo góc + icon nhỏ, kèm đánh giá NGON / TỐT / KHÔNG NÊN ĂN bằng màu sắc và biểu tượng:\r\n🔵 THỊT TÔM (NGON – NÊN ĂN)\r\n– Thịt chắc, ngọt tự nhiên\r\n– Giàu protein, ít béo\r\n– Phù hợp mọi món ăn\r\n🟢 TRỨNG TÔM / BUỒNG TRỨNG (RẤT NGON – BỔ)\r\n– Vị béo, bùi\r\n– Giàu dinh dưỡng\r\n– Đặc sản tôm cái\r\n🟢 VỎ TÔM (TỐT – DÙNG NẤU NƯỚC)\r\n– Giàu canxi\r\n– Dùng nấu nước dùng, xay làm bột\r\n– Không ăn trực tiếp\r\n🟡 ĐẦU TÔM (ĂN ĐƯỢC – NHƯNG KHÔNG NÊN ĂN NHIỀU)\r\n– Có gạch, vị béo\r\n– Dễ tích tụ chất thải\r\n– Nên ăn vừa phải\r\n🔴 CHỈ ĐEN / ĐƯỜNG RUỘT (KHÔNG NÊN ĂN)\r\n– Chứa chất thải\r\n– Nên loại bỏ trước khi chế biến\r\n🟡 MANG & DẠ DÀY (KHÔNG ĂN)\r\n– Không có giá trị ẩm thực\r\n– Nên bỏ khi sơ chế\r\nHệ thống màu & icon:\r\n– 🟢 Xanh: ngon – nên ăn\r\n– 🟡 Vàng: ăn được nhưng hạn chế\r\n– 🔴 Đỏ: không nên ăn\r\nTypography:\r\n– Tiêu đề lớn: “CON TÔM – PHẦN NÀO NGON & NÊN ĂN?”\r\n– Tiêu đề phụ: “Infographic trực quan – dễ hiểu”\r\n– Chữ rõ, sạch, phân cấp to – vừa – nhỏ\r\n– Font sans-serif hiện đại, dễ đọc\r\nPhong cách hình ảnh:\r\n– Nền trắng hoặc xám rất nhạt\r\n– Ánh sáng studio mềm\r\n– Đổ bóng nhẹ\r\n– Phong cách giáo dục + ẩm thực cao cấp\r\nKhông ghê rợn.\r\nKhông giải phẫu y khoa nặng.\r\nKhông chữ rối.\r\nKhông watermark.\r\n⸻\r\n❌ NEGATIVE PROMPT\r\nmáu me, nội tạng ghê, tranh vẽ tay, hoạt hình trẻ em, màu gắt, bố cục rối, chữ khó đọc, font xấu, watermark","id":"b3d22061829a42b9","filename":"infographic-009.jpg","albumSlug":"infographic-sample"},{"type":"single","src":"../split/infographic-sample/infographic-010.webp","src_a":null,"src_b":null,"name":"infographic-010","metadata":{"title":"Trà đào hiện đại","description":null,"variant":"ai_technology","attributes":{"category":"AI training","application":"Infographic","models":["Gemini"]},"tags":["gemini"]},"content":"\r\nThiết kế infographic đồ uống hiện đại với chủ đề ly trà đào, phong cách giống infographic nước ép cao cấp.\r\nMột ly trà đào mát lạnh đặt ở chính giữa khung hình, góc nhìn hơi từ trên xuống (top-down / 3-4 view), ly thủy tinh trong suốt, thấy rõ màu trà vàng cam đẹp mắt, đá viên bên trong.\r\nNguyên liệu được sắp xếp xung quanh ly theo bố cục tròn, bay nhẹ trong không khí, có mũi tên cong chỉ quy trình:\r\n– Đào tươi (cắt lát, màu cam hồng)\r\n– Trà đen / trà lài\r\n– Lát chanh vàng\r\n– Lá bạc hà\r\n– Đá viên trong suốt\r\n– Giọt trà / giọt syrup rơi nhẹ\r\nCác khối thông tin dạng card bo góc, kèm icon nhỏ tinh tế, font hiện đại, phân cấp chữ rõ ràng:\r\n– Select Fresh Peaches (Chọn đào tươi)\r\n– Brew Tea (Ủ trà)\r\n– Slice & Mix (Cắt & pha)\r\n– Serve with Ice (Thêm đá & thưởng thức)\r\nThông tin nhỏ ở phía dưới (dạng badge / pill):\r\n– Nhiệt độ phục vụ: 4–8°C\r\n– Độ tươi: High\r\n– Hương vị: Thanh mát – ngọt dịu\r\n– Phục vụ lạnh\r\nPhong cách hình ảnh:\r\n– Nền sáng, trắng hoặc xám rất nhạt\r\n– Ánh sáng studio mềm, đổ bóng nhẹ\r\n– Màu sắc tươi, sạch, cao cấp\r\n– Kết hợp ảnh đồ uống chân thực + infographic hiện đại\r\n– Cảm giác fresh, lifestyle, mạng xã hội cao cấp\r\nTypography:\r\n– Tiêu đề chữ to, rõ, hiện đại\r\n– Chú thích chữ vừa\r\n– Thông tin phụ chữ nhỏ\r\n– Font sans-serif gọn gàng, dễ đọc\r\nKhông có người.\r\nKhông quảng cáo rối.\r\nKhông watermark.\r\nKhông phong cách hoạt hình.\r\n⸻\r\n❌ NEGATIVE PROMPT\r\nhoạt hình, chibi, tranh vẽ tay, bố cục lộn xộn, màu gắt, ly méo, chất lỏng đục, chữ sai chính tả, watermark, phong cách rẻ tiền","id":"194db02fa19ed98d","filename":"infographic-010.jpg","albumSlug":"infographic-sample"},{"type":"single","src":"../split/infographic-sample/infographic-011.webp","src_a":null,"src_b":null,"name":"infographic-011","metadata":{"title":"Máy tính bàn - Cấu tạo & Linh kiện","description":null,"variant":"ai_technology","attributes":{"category":"AI training","application":"Infographic","models":["Gemini"]},"tags":["gemini"]},"content":"\r\nThiết kế infographic cấu tạo máy tính bàn (desktop PC) phong cách trình bày chuyên nghiệp – catalog sản phẩm – bản vẽ kỹ thuật hiện đại.\r\nMột bộ máy tính bàn được đặt ở trung tâm, hiển thị ở góc nhìn 3/4, cắt lớp (cutaway) để nhìn rõ toàn bộ linh kiện bên trong thùng máy.\r\nHệ thống chú thích khoa học, dùng đường line mảnh, icon nhỏ tinh tế, bố cục gọn gàng, dễ đọc:\r\n– Icon CPU → Bộ vi xử lý\r\n– Icon mainboard → Bo mạch chủ\r\n– Icon RAM → Bộ nhớ RAM\r\n– Icon GPU → Card đồ họa\r\n– Icon ổ cứng → SSD / HDD\r\n– Icon quạt → Hệ thống tản nhiệt\r\n– Icon nguồn → Bộ nguồn PSU\r\n– Icon cổng kết nối → USB, HDMI, LAN\r\n– Icon case → Thùng máy\r\nTypography (phân cấp rõ ràng):\r\n– Tiêu đề chính (chữ lớn, đậm, sang trọng):\r\n“MÁY TÍNH BÀN – CẤU TẠO & LINH KIỆN”\r\n– Tiêu đề phụ (cỡ trung):\r\n“Infographic linh kiện phần cứng”\r\n– Chú thích linh kiện (chữ nhỏ, rõ nét, dễ đọc)\r\n– Phân cấp chữ to – vừa – nhỏ rõ ràng\r\n– Font hiện đại, tối giản, cảm giác công nghệ cao (editorial / tech premium)\r\nPhong cách màu sắc:\r\n– Tông xám – đen – bạc chủ đạo\r\n– Điểm nhấn xanh dương / xanh lá công nghệ\r\n– Màu sắc hài hòa, không gắt\r\nPhong cách hình ảnh:\r\n– Kết hợp render 3D chân thực + infographic kỹ thuật\r\n– Ánh sáng studio mềm, làm nổi khối linh kiện\r\n– Đổ bóng nhẹ, sạch sẽ\r\n– Độ chi tiết cao, sắc nét\r\n– Cảm giác hiện đại, chuyên nghiệp, công nghệ\r\nBố cục tổng thể:\r\n– Máy tính làm hero visual ở trung tâm\r\n– Chú thích + icon bố trí xung quanh cân đối\r\n– Nhiều khoảng trống (negative space)\r\n– Phong cách giống tài liệu kỹ thuật, brochure sản phẩm, slide thuyết trình\r\nKhông có người.\r\nKhông phong cách hoạt hình.\r\nKhông chữ quảng cáo rối.\r\nKhông watermark.\r\n⸻\r\n❌ NEGATIVE PROMPT (BẮT BUỘC)\r\nhoạt hình, chibi, vẽ tay, icon to thô, font xấu, chữ rối, màu sặc sỡ, bố cục lộn xộn, nền phức tạp, linh kiện sai vị trí, mờ nhòe, watermark","id":"1e58fb72ab9d30ab","filename":"infographic-011.jpg","albumSlug":"infographic-sample"},{"type":"single","src":"../split/infographic-sample/infographic-012.webp","src_a":null,"src_b":null,"name":"infographic-012","metadata":{"title":"Cơm tấm sườn nướng","description":null,"variant":"ai_technology","attributes":{"category":"AI training","application":"Infographic","models":["Gemini"]},"tags":["gemini"]},"content":"\r\n“Infographic công thức nấu ăn hiện đại, siêu sạch và cao cấp.\r\nTrình bày món cơm tấm ở trạng thái hoàn thiện đẹp mắt — cơm tấm sườn nướng được cắt gọn, bày trên đĩa đầy đủ sườn, bì, chả, trứng, mỡ hành — góc nhìn hơi nghiêng hoặc phối cảnh nhẹ, món ăn như đang lơ lửng tinh tế.\r\nSắp xếp nguyên liệu, các bước thực hiện và mẹo nấu xung quanh món ăn theo bố cục editorial năng động, không giới hạn góc top-down.\r\nKhu vực Nguyên liệu:\r\n– Sử dụng icon hoặc minh họa nhỏ cho từng nguyên liệu (gạo tấm, sườn heo, bì, chả trứng, trứng ốp la, mỡ hành, nước mắm, đồ chua…)\r\n– Có định lượng rõ ràng\r\n– Bố trí theo cụm, danh sách hoặc vòng tròn, liên kết trực quan với món chính\r\nKhu vực Các bước thực hiện:\r\n– Minh họa các bước nấu bằng khung đánh số, mũi tên hoặc đường dẫn\r\n– Tạo luồng chuyển động logic xoay quanh món ăn\r\n– Kết hợp icon nấu ăn nhỏ như: dao, chảo, vỉ nướng, đồng hồ, bếp\r\nThông tin bổ sung (tùy chọn):\r\n– Tổng calories\r\n– Thời gian chuẩn bị / nấu\r\n– Khẩu phần\r\n– Độ đậm đà / độ cay\r\n– Hiển thị dưới dạng bubble hoặc badge gọn gàng gần món ăn\r\nPhong cách hình ảnh:\r\nInfographic editorial kết hợp food photography lifestyle.\r\nMàu sắc món ăn tươi, tự nhiên, hấp dẫn.\r\nĐổ bóng nhẹ, icon vector sạch, typography hiện đại.\r\nGradient mềm hoặc glassmorphism cho các khung bước nấu.\r\nMàu nhấn dùng để làm nổi bật thông tin quan trọng (calories, thời gian).\r\nBố cục:\r\n– Món cơm tấm là hero visual (góc nghiêng / phối cảnh)\r\n– Nguyên liệu và các bước chảy quanh món ăn một cách trực quan\r\n– Thứ bậc rõ ràng: món chính > bước nấu > nguyên liệu > thông tin phụ\r\n– Nhiều khoảng trống (negative space) để bố cục thoáng và dễ đọc\r\nÁnh sáng & Nền:\r\nÁnh sáng studio tự nhiên, mềm.\r\nNền tối giản có texture nhẹ hoặc gradient tinh tế, cảm giác editorial cao cấp.\r\nOutput:\r\n1080×1080, độ nét cực cao, tối ưu cho mạng xã hội, không watermark.”\r\n","id":"857003e42a726dc1","filename":"infographic-012.jpg","albumSlug":"infographic-sample"},{"type":"single","src":"../split/infographic-sample/infographic-013.webp","src_a":null,"src_b":null,"name":"infographic-013","metadata":{"title":"Lợi ích của rau xanh - nền tảng sức khỏe tự nhiên","description":null,"variant":"ai_technology","attributes":{"category":"AI training","application":"Infographic","models":["Gemini"]},"tags":["gemini"]},"content":"\r\nThiết kế một infographic hiện đại, cao cấp phân tích LỢI ÍCH CỦA RAU XANH trong 1 khung hình duy nhất.\r\n\r\nBỐ CỤC:\r\n– Layout dạng radial / hub & spoke (trung tâm + các nhánh xung quanh)\r\n– Trung tâm là chai nước ép rau xanh trong suốt (green detox juice)\r\n– Bao quanh là 4–6 loại rau xanh tươi:\r\n– Rau bina\r\n– Cải xoăn\r\n– Bông cải xanh\r\n– Xà lách\r\n– Rau cần\r\n– Diếp cá (tùy chọn)\r\n– Các rau được bố trí lơ lửng, cân đối, kết nối với trung tâm bằng đường cong mảnh + icon nhỏ\r\n\r\nNỘI DUNG CHỮ (100% TIẾNG VIỆT – RÕ RÀNG – NGẮN GỌN):\r\n\r\nTIÊU ĐỀ CHÍNH (ở trên):\r\n“RAU XANH – NỀN TẢNG SỨC KHỎE TỰ NHIÊN”\r\n\r\nCỤM LỢI ÍCH (đặt quanh chai – mỗi cụm 1 icon):\r\n– 🌱 Thanh lọc & giải độc cơ thể\r\n– ❤️ Tốt cho tim mạch\r\n– 🧠 Hỗ trợ trí não & giảm căng thẳng\r\n– 🦴 Tăng cường xương & khớp\r\n– ✨ Làm đẹp da, chống lão hóa\r\n– 🔥 Hỗ trợ tiêu hóa & kiểm soát cân nặng\r\n\r\nKHỐI DINH DƯỠNG (ở dưới hoặc bên phải – dạng thẻ bo góc):\r\n– Vitamin: A • C • K\r\n– Khoáng chất: Sắt • Canxi • Magie\r\n– Chất xơ: Cao\r\n– Chất chống oxy hóa: Dồi dào\r\n\r\nGỢI Ý SỬ DỤNG (nhỏ – tinh tế):\r\n– Dùng tươi mỗi ngày\r\n– Ép / xay chậm\r\n– Bảo quản 2–5°C\r\n\r\nPHONG CÁCH THIẾT KẾ:\r\n– Hiện đại – tinh tế – cao cấp\r\n– Nền sáng hoặc gradient trắng–xanh nhạt\r\n– Ánh sáng studio mềm, sạch\r\n– Đổ bóng nhẹ, chiều sâu rõ\r\n– Không rối, không nhiều chữ\r\n\r\nMÀU SẮC:\r\n– Xanh lá tự nhiên chủ đạo\r\n– Trắng – xám nhạt – xanh mint\r\n– Accent nhẹ màu vàng nhạt / xanh olive\r\n\r\nCHỮ:\r\n– Sans-serif hiện đại\r\n– Dễ đọc, spacing thoáng\r\n– Không font đậm nặng\r\n\r\nYÊU CẦU CHẤT LƯỢNG:\r\n– Ultra high resolution\r\n– Phong cách infographic sức khỏe cao cấp\r\n– Phù hợp đăng Facebook, Instagram, slide thuyết trình\r\n– Không logo\r\n– Không watermark\r\n– Không chữ tiếng Anh\r\n\r\n⸻\r\n\r\nMình chia sẻ lại cách làm này cho anh em nào cần.\r\nAi thấy hữu ích thì cho mình 1 like 👍\r\nHoặc share lại cho người đang loay hoay làm hình quảng cáo 🔥\r\n\r\nĐôi khi,\r\nlàm ít hơn – nhưng làm đúng ngay từ đầu\r\nlại ra kết quả tốt hơn rất nhiều.","id":"3d8f938d1933b77f","filename":"infographic-013.jpg","albumSlug":"infographic-sample"},{"type":"single","src":"../split/infographic-sample/infographic-014.webp","src_a":null,"src_b":null,"name":"infographic-014","metadata":{"title":"Hành trình trà Thái Nguyên","description":null,"variant":"ai_technology","attributes":{"category":"AI training","application":"Infographic","models":["Gemini"]},"tags":["gemini"]},"content":"\r\n🌱 PROMPT – HÀNH TRÌNH TRÀ THÁI NGUYÊN\r\nPHONG CÁCH MINIATURE – FRAME LIÊN KẾT MỀM MƯỢT\r\nThiết kế một infographic phong cách miniature (thế giới thu nhỏ) mô tả hành trình             <!-- Custom Lightbox Logic -->
            <script>
                // Lightbox Global State
                let hintTimer = null;
                let panzoomInstance = null;
                let currentIndex = 0;

                function openLightbox(index, skipHistory = false) {
                    try {
                        // Safety checks
                        if (!currentPhotos || currentPhotos.length === 0) return;
                        currentIndex = index;
                        const photo = currentPhotos[index];

                        // 1. Deep Link
                        if (!skipHistory) {
                            const safeName = photo.name.replace(/\s+/g, '-').toLowerCase();
                            history.pushState(null, null, `#${safeName}`);
                        }

                        const modal = document.getElementById('lightbox-modal');
                        const container = document.getElementById('lightbox-image-container');
                        const sidebar = document.getElementById('lightbox-sidebar');
                        const mainContainer = document.querySelector('.lightbox-container');

                        if (!modal || !container || !sidebar) throw new Error("Elements missing");

                        // Mobile Optimization: Auto-hide sidebar by default
                        if (window.innerWidth <= 768) {
                            sidebar.classList.add('hidden');
                            mainContainer.classList.add('sidebar-closed');
                        } else {
                            // Desktop: Ensure open by default
                            sidebar.classList.remove('hidden');
                            mainContainer.classList.remove('sidebar-closed');
                        }

                        // 2. Render Sidebar Info
                        document.getElementById('lightbox-title').innerText = photo.metadata?.title || photo.name;
                        document.getElementById('lightbox-counter').innerText = `${currentIndex + 1} / ${currentPhotos.length}`;
                        document.getElementById('lightbox-desc').innerText = photo.metadata?.description || '';
                        document.getElementById('lightbox-content').innerText = photo.content || '';

                        // Render Tags
                        const tagSelect = document.getElementById('lightbox-tags');
                        const rootPath = ".." || ".";
                        tagSelect.innerHTML = (photo.metadata?.tags || []).map(tag =>
                            `<a href="${rootPath}/tag?id=${encodeURIComponent(tag)}" class="tag-chip">${tag}</a>`
                        ).join('');

                        // 3. Render Image Stage
                        if (panzoomInstance) { try { panzoomInstance.dispose(); } catch (e) { } }
                        panzoomInstance = null;
                        container.innerHTML = '';

                        // Split vs Single Logic
                        if ((photo.type === 'split' || (photo.src_a && photo.src_b)) && photo.src_a && photo.src_b) {
                            container.innerHTML = `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#000;"><canvas id="stitchCanvas" style="max-width:100%; max-height:100%; cursor: grab; display:block;"></canvas></div>`;
                            const canvas = document.getElementById('stitchCanvas');

                            if (typeof CanvasStitchViewer !== 'undefined') {
                                if (window.canvasViewer) { /* clean */ }
                                window.canvasViewer = new CanvasStitchViewer(canvas, photo.src_a, photo.src_b);
                                panzoomInstance = null;
                                addDecoyOverlay(container, canvas);
                            } else {
                                container.innerHTML = "<p style='color:white'>Error: Viewer component missing.</p>";
                            }
                        } else {
                            if (window.canvasViewer) window.canvasViewer = null;

                            const img = document.createElement('img');
                            img.src = photo.src;
                            img.style.maxHeight = '90vh';
                            img.style.maxWidth = '90vw';
                            img.draggable = false;

                            // Load handler
                            img.onload = () => {
                                initPanzoom(img);
                                addDecoyOverlay(container, img);
                            };

                            container.appendChild(img);
                        }

                        if (typeof window.trackView === 'function') {
                            window.trackView(photo);
                        }

                        // Activate Modal
                        modal.classList.add('active');
                        // Clean up any forced inline styles from previous debug steps
                        modal.style.removeProperty('display');
                        modal.style.removeProperty('opacity');

                        // Reset Hint Timer
                        if (typeof resetHintTimer === 'function') resetHintTimer();

                    } catch (e) {
                        console.error("Lightbox Error:", e);
                    }
                }

                // --- Panzoom Helper ---
                function initPanzoom(elem) {
                    // Clean up previous instance
                    if (panzoomInstance) {
                        try { panzoomInstance.dispose(); } catch (e) { }
                        panzoomInstance = null;
                    }

                    // Initialize new instance
                    try {
                        panzoomInstance = panzoom(elem, {
                            maxZoom: 5,
                            minZoom: 1,
                            bounds: true,
                            boundsPadding: 0.1,
                            zoomDoubleClickSpeed: 1 // Disable zoom on double click if needed, or keep default
                        });
                    } catch (e) {
                        console.error("Panzoom Init Failed:", e);
                    }
                }

                // --- Sidebar & Tools ---
                function toggleSidebar() {
                    const sidebar = document.getElementById('lightbox-sidebar');
                    const container = document.querySelector('.lightbox-container');
                    const isClosed = sidebar.classList.toggle('hidden');
                    container.classList.toggle('sidebar-closed');

                    // Reset Hint Timer on Toggle
                    resetHintTimer();
                }

                // --- UX Hint Logic ---
                function resetHintTimer() {
                    // Clear existing
                    clearTimeout(hintTimer);
                    removePulse();

                    // Set new timer (3 seconds)
                    hintTimer = setTimeout(() => {
                        showPulseHint();
                    }, 3000);
                }

                function showPulseHint() {
                    const sidebar = document.getElementById('lightbox-sidebar');
                    const isHidden = sidebar.classList.contains('hidden');

                    let targetBtn, tooltip, msg;

                    if (isHidden) {
                        // Target the floating button
                        targetBtn = document.querySelector('.stage-toggle-btn');
                        // We need to inject tooltip if not exists or select it
                        // Simplified: Assume we added tooltip html structure dynamically or statically?
                        // Let's add tooltip structure in HTML above for both buttons

                        // For floating button (needs dynamic tooltip insertion since it's simple button)
                        if (!targetBtn.querySelector('.hint-tooltip')) {
                            const tt = document.createElement('div');
                            tt.className = 'hint-tooltip';
                            targetBtn.appendChild(tt);
                        }
                        tooltip = targetBtn.querySelector('.hint-tooltip');
                        msg = "Mở Thông Tin";
                    } else {
                        // Target the sidebar button
                        targetBtn = document.getElementById('sidebar-info-btn');
                        tooltip = document.getElementById('sidebar-hint');
                        msg = "Ẩn Thông Tin";
                    }

                    if (targetBtn && tooltip) {
                        targetBtn.classList.add('pulse-btn');
                        tooltip.innerText = msg;
                        tooltip.classList.add('hint-visible');

                        // Auto hide after 5s or click?
                        // Let's hide on next interaction (click handles it via toggle -> resetHintTimer)
                        // But also auto-hide pulse after 4s to not annoy
                        setTimeout(() => removePulse(), 4000);
                    }
                }

                function removePulse() {
                    document.querySelectorAll('.pulse-btn').forEach(el => el.classList.remove('pulse-btn'));
                    document.querySelectorAll('.hint-visible').forEach(el => el.classList.remove('hint-visible'));
                }

                function copyMeta() {
                    if (!currentPhotos[currentIndex]) return;
                    const p = currentPhotos[currentIndex];
                    // Copy ONLY body content
                    const content = p.content || '';
                    if (content) {
                        navigator.clipboard.writeText(content).catch(err => console.error("Copy failed:", err));
                    }
                }

                // --- Unified Share Helper ---
                window.shareUrl = async function (title, text, url) {
                    if (navigator.share) {
                        try {

                            // But Panzoom often attaches to 'touchstart' on the element.
                            // Forwarding Touch is complex. 
                            // Easier strategy for Touch: 
                            // Mobile usually doesn't have "Right Click Save As" easily on overlays?
                            // Actually long press calls context menu.
                            // If we set pointer-events: none on mobile?
                        }

                        if (newEvent && targetElement) {
                            targetElement.dispatchEvent(newEvent);
                        }

                    ['mousedown', 'wheel'].forEach(evt => {

                            forwardEvent(e);

                    // For now, let's keep touch simple. Most users hold-to-save.

                    // Let's try setting pointer-events: none ONLY for touch devices?

            <script type="module">
                import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
                import { getDatabase, ref, increment, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

                const firebaseConfig = window.FIREBASE_CONFIG || {};
                // Removed duplicate declaration

                let db = null;

                if (true && firebaseConfig.apiKey) {
                    try {
                        const app = initializeApp(firebaseConfig);
                        db = getDatabase(app);
                        console.log("🔥 Firebase Initialized");

                        // 1. Initial Sync (Get all views once for Grid)
                        syncGlobalViews();

                    } catch (e) {
                        console.error("Firebase Init Error:", e);
                    }
                }

                // --- Global View Functions ---

                // A. Sync all views for Grid Items
                async function syncGlobalViews() {
                    if (!db) return;
                    const viewNodes = document.querySelectorAll('[data-view-id]');
                    if (viewNodes.length === 0) return;

                    // Optimization: Fetch ALL views once (assuming lightweight dataset < 1MB)
                    // If dataset grows > 10k items, we might need batched gets, but for now this is fastest/cheapest.
                    const dbRef = ref(db, 'views');
                    try {
                        const snapshot = await get(dbRef);
                        if (snapshot.exists()) {
                            const allViews = snapshot.val();
                            updateDomCounts(allViews);
                        }

                        // Optional: Listen for changes? 
                        // For cost savings, we usually don't listen to the WHOLE list. 
                        // Just fetching once on load is enough for grid.
                        // Lightbox handles real-time single updates.
                    } catch (e) {
                        console.error("View Sync Error:", e);
                    }
                }

                function updateDomCounts(allViews) {
                    const viewNodes = document.querySelectorAll('[data-view-id]');
                    viewNodes.forEach(node => {
                        const id = node.getAttribute('data-view-id');
                        if (allViews[id]) {
                            const countParams = node.querySelectorAll('.view-count-text');
                            countParams.forEach(el => el.innerText = allViews[id]);
                        } else {
                            const countParams = node.querySelectorAll('.view-count-text');
                            countParams.forEach(el => el.innerText = '0');
                        }
                    });
                }

                // B. Track View (triggered by Lightbox)
                window.trackView = function (photo) {
                    if (!db) { console.error("❌ Firebase DB not initialized."); return; }
                    if (!photo) { console.warn("❌ TrackView called with null photo."); return; }

                    // const viewId = `${photo.albumSlug}__${photo.filename.replace(/\./g, '_')}`; 
                    // Wait, `photo.id` in feed/album JSONs is ALREADY generated correctly.
                    const viewId = photo.id;
                    console.log("👀 Tracking View for:", viewId);

                    if (!viewId) { console.warn("No viewId for photo", photo); return; }

                    // Real-time Listener for Lightbox Sidebar
                    const viewRef = ref(db, `views/${viewId}`);

                    // 1. Listen (Realtime UI Update)
                    // Unsubscribe previous if exists? (Simple way: just new listener, it overwrites context if clean)
                    // Better: Store unsubscribe fn if needed. For now, onValue returns unsubscribe.
                    const unsub = onValue(viewRef, (snapshot) => {
                        const count = snapshot.val() || 0;
                        // Update Lightbox Sidebar
                        const lbCount = document.getElementById('lightbox-view-count-val');
                        if (lbCount) lbCount.innerText = count;
                    });
                    // Store unsub to cleanup on close? (Valid optimization for SPA users)
                    window.currentViewUnsub = unsub;


                    // 2. Increment Transaction (Spam Control: localStorage)
                    const storageKey = `viewed_${viewId}`;
                    const hasViewed = localStorage.getItem(storageKey);

                    if (!hasViewed) {
                        console.log("🚀 Incrementing view count...");
                        update(ref(db), {
                            [`views/${viewId}`]: increment(1)
                        }).then(() => {
                            console.log("✅ View Count Incremented:", viewId);
                            localStorage.setItem(storageKey, 'true');
                        }).catch(e => {
                            console.error("❌ Firebase Update Error:", e);
                            if (e.code === 'PERMISSION_DENIED') console.warn("💡 Check Firebase Rules test mode.");
                        });
                    } else {
                        console.log("Duplicate view ignored (localStorage check).");
                    }
                };

                // Cleanup listener helper
                window.cleanupViewListener = function () {
                    if (window.currentViewUnsub) {
                        window.currentViewUnsub();
                        window.currentViewUnsub = null;
                    }
                }

                window.debugFirebase = {
                    checkConnection: () => {
                        if (db) console.log("✅ Firebase DB Instance exists.");
                        else console.error("❌ Firebase DB is NULL.");
                    },
                    forceTrack: (id) => {
                        if (!db) return;
                        update(ref(db), { [`views/${id}`]: increment(1) })
                            .then(() => console.log("Forced update success"))

                    clearHistory: () => {

                    }
                };

                window.refreshViewCounts = syncGlobalViews;
